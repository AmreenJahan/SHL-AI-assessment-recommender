services:
  - type: web
    name: shl-assessment-recommender
    env: python
    pythonVersion: 3.9
    buildCommand: pip install -r requirements_ultra.txt
    startCommand: uvicorn app_ultra_final:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    healthCheckTimeout: 30
    healthCheckGracePeriod: 10
    autoDeploy: true
    plan: free
    region: oregon
    envVars:
      - key: GEMINI_API_KEY
        sync: false
        value: ""
